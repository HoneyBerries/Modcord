name: Deploy Modcord

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build JAR
        run: ./gradlew assemble

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # Waits until your VM is reachable before continuing
          ping: modcordvm.tailfb2424.ts.net

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v1
        with:
          host: modcordvm.tailfb2424.ts.net
          username: ModcordUser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*-all.jar"
          target: "/home/ModcordUser/Modcord/"
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: modcordvm.tailfb2424.ts.net
          username: ModcordUser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ModcordUser/Modcord
            sudo systemctl stop modcord
            mv *-all.jar Modcord.jar
            sudo systemctl start modcord
            sleep 3
            systemctl is-active --quiet modcord && echo "✅ Modcord is running" || echo "❌ Modcord failed to start"
