name: Claude Dependency Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash,Read,Edit,Write"
          prompt: |
            Work from the `dev` branch of this repo. Never touch `main`.

            1. Pull the latest `dev`, then create a new branch named `claude/dep-update-<date>`.
            2. Update dependencies using `./gradlew refreshVersions` as a starting point, then
               review and apply the resulting changes to `libs.versions.toml` and any other
               affected files. Skip snapshot/alpha/beta versions unless already in use.
            3. Run `./gradlew build` and `./gradlew runTest` to verify the update works.
            4. Commit the changes and push the branch.
            5. Open a PR from this branch into `dev` (never into `main`).
            6. Monitor CI on the PR. If it fails, investigate, fix on the same branch, push,
               and wait for CI again. Repeat until CI passes or the failure needs human input.
            7. Once CI passes, merge the PR into `dev`.
            8. After merging, delete the branch both locally and on the remote.

            If there are no outdated dependencies worth updating, do not create a branch or PR
            — just report that nothing needed changing.
